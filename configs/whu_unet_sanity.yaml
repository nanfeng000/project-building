experiment_name: whu_unet_sanity

dataset:
  name: whu
  train_manifest: /root/autodl-tmp/project-building/data/meta/whu_train.csv
  val_manifest: /root/autodl-tmp/project-building/data/meta/whu_val.csv
  batch_size: 8
  num_workers: 2
  use_augment: true

model:
  name: unet
  in_channels: 3
  num_classes: 1
  base_channels: 32
  dropout: 0.0

train:
  seed: 42
  epochs: 10
  amp: true
  output_dir: /root/autodl-tmp/project-building/outputs/sanity_whu_unet
  early_stopping_patience: 5

  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0001

  scheduler:
    name: cosine
    t_max: 10
    eta_min: 1.0e-6

  loss:
    name: bce_dice

sanity_run:
  train_samples: 64
  val_samples: 16
  batch_size: 8
  epochs: 4
  early_stopping_patience: 4
