experiment_name: whu_deeplabv3_resnet50_seed42

dataset:
  name: whu
  train_manifest: /root/autodl-tmp/project-building/data/meta/whu_train.csv
  val_manifest: /root/autodl-tmp/project-building/data/meta/whu_val.csv
  test_manifest: /root/autodl-tmp/project-building/data/meta/whu_test.csv
  batch_size: 8
  num_workers: 4
  use_augment: true

model:
  name: deeplabv3_resnet50
  num_classes: 1
  pretrained_backbone: true
  aux_loss: false

train:
  seed: 42
  epochs: 80
  amp: true
  output_dir: /root/autodl-tmp/project-building/outputs/whu_deeplabv3_resnet50_seed42
  early_stopping_patience: null
  grad_clip_norm: 1.0

  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0001

  scheduler:
    name: cosine
    t_max: 80
    eta_min: 1.0e-6

  loss:
    name: bce_dice

eval:
  boundary_kernel: 3

test:
  num_visualizations: 8
  foreground_prefetch_ratio: 0.005
