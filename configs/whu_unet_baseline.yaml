experiment_name: whu_unet_baseline

dataset:
  name: whu
  train_manifest: /root/autodl-tmp/project-building/data/meta/whu_train.csv
  val_manifest: /root/autodl-tmp/project-building/data/meta/whu_val.csv
  test_manifest: /root/autodl-tmp/project-building/data/meta/whu_test.csv
  batch_size: 8
  num_workers: 4
  use_augment: true

model:
  name: unet
  in_channels: 3
  num_classes: 1
  base_channels: 32
  dropout: 0.0

train:
  seed: 42
  epochs: 80
  amp: true
  output_dir: /root/autodl-tmp/project-building/outputs/whu_unet_baseline
  early_stopping_patience: null

  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0001

  scheduler:
    name: cosine
    t_max: 80
    eta_min: 1.0e-6

  loss:
    name: bce_dice

test:
  num_visualizations: 8
  foreground_prefetch_ratio: 0.005
